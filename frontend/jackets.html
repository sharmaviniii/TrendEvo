<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackets & Coats</title>

<style>
:root{
    --bg-page: radial-gradient(circle at top left, #1b2435 0%, #050712 55%, #020309 100%);
    --card-bg: #0b0f1a;
    --sidebar-bg: #050812;
    --accent: #f3c46b;
    --accent-soft: #f7d58e;
    --muted: #9ca3b9;
    --border-subtle: #111827;
    --radius-lg: 18px;
    --shadow-soft: 0 22px 60px rgba(0,0,0,0.8);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}

body{
    background:var(--bg-page);
    color:#f9fafb;
}

/* Layout */
.container{
    display:flex;
    width:100%;
    padding:26px 32px;
    gap:28px;
}

/* SIDEBAR */
.sidebar{
    width:270px;
    background:var(--sidebar-bg);
    padding:40px 40px 50px;
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft);
    border:1px solid #111827;
    position:sticky;
    top:80px;
    align-self:flex-start;
}

.sidebar h2{
    font-size:18px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#f9fafb;
    margin-bottom:14px;
}

.filter-section{
    margin-bottom:18px;
    padding-bottom:16px;
    border-bottom:1px solid #111827;
}

.filter-section:last-of-type{
    border-bottom:none;
    padding-bottom:0;
}

.filter-title{
    font-size:13px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--accent-soft);
    margin-bottom:10px;
}

.sidebar label{
    display:flex;
    align-items:center;
    gap:8px;
    margin:5px 0;
    font-size:13px;
    color:var(--muted);
    padding:6px 8px;
    border-radius:10px;
    cursor:pointer;
}

.sidebar input[type="checkbox"]{
    width:15px;
    height:15px;
    accent-color:var(--accent);
}

/* RIGHT SIDE */
.grid{
    flex:1;
}

.grid-title{
    font-size:26px;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:6px;
}

.grid-subtitle{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
}

.sort-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
    gap:8px;
}

.sort-row select{
    background:#050712;
    padding:9px 14px;
    border-radius:999px;
    color:#f9fafb;
    border:1px solid #111827;
}

/* PRODUCT GRID */
.grid{flex:1;}
.products{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
}



/* CARD */
.card{
    background:radial-gradient(circle at top left,#141827,#050712);
    padding:14px;
    border-radius:var(--radius-lg);
    box-shadow:0 18px 40px rgba(0,0,0,0.8);
    border:1px solid #111827;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:14px;
    transition:0.3s;
}

/* Hover zoom */
.card:hover img{
    transform:scale(1.05);
}

.card-name{margin-top:10px;}
.card-price{opacity:0.85;}

/* BUTTON */
.view-btn{
    margin-top:10px;
    background:var(--accent);
    border:none;
    padding:9px;
    border-radius:999px;
    width:100%;
    cursor:pointer;
}

.view-btn:hover{
    background:var(--accent-soft);
}

/* MODAL */
#imageModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#imageModal img{
    max-width:85%;
    max-height:85%;
    border-radius:16px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<span class="close" onclick="event.stopPropagation(); closeModal()">✖</span>
<img id="modalImg">
</div>

<script>
function openModal(btn){
    let img = btn.parentElement.querySelector("img").src;
    document.getElementById("modalImg").src = img;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>
